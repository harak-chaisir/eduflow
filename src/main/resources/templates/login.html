<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · EduFlow</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" th:href="@{/css/eduflow.css}">
</head>
<body class="auth">

    <div class="auth__card">

        <!-- Brand -->
        <div class="auth__brand">
            <span class="auth__mark"><i data-lucide="graduation-cap"></i></span>
            <div>
                <div class="auth__title">EduFlow CRM</div>
                <div class="auth__sub">Education consultancy platform</div>
            </div>
        </div>

        <h2 class="auth__heading">
            Sign in to your account
        </h2>

        <!-- Logout / error messages -->
        <div th:if="${logoutMessage}" class="flash flash--success flash--spaced">
            <i data-lucide="check-circle-2"></i>
            <span th:text="${logoutMessage}">Signed out.</span>
        </div>
        <div th:if="${errorMessage}" class="flash flash--error flash--spaced">
            <i data-lucide="alert-circle"></i>
            <span th:text="${errorMessage}">Error.</span>
        </div>

        <!-- Login form — handled by Spring Security's UsernamePasswordAuthenticationFilter -->
        <form th:action="@{/login}" method="post" novalidate>

            <div class="field">
                <label class="field__label" for="email">Email address</label>
                <input class="input" type="email" id="email" name="email" autocomplete="email"
                       required placeholder="you@consultancy.com" />
            </div>

            <div class="field">
                <label class="field__label" for="password">Password</label>
                <input class="input" type="password" id="password" name="password"
                       autocomplete="current-password" required placeholder="••••••••" />
            </div>

            <th:block th:replace="~{fragments/components :: csrfInput}"></th:block>

            <button class="btn btn--primary auth__submit" type="submit">
                <i data-lucide="log-in"></i><span>Sign in</span>
            </button>
        </form>
    </div>

    <script th:src="@{/js/lucide.js}"></script>
    <script>
        if (window.lucide) { lucide.createIcons(); }
    </script>
</body>
</html>
