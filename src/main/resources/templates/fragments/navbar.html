<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
    Reusable navigation bar fragment.
    Usage: <header th:replace="~{fragments/navbar :: navbar('students')}"></header>
    activePage values: 'dashboard' | 'students' | 'documents' | 'applications' | 'visa'
-->
<header th:fragment="navbar(activePage)"
        class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- ── Logo ──────────────────────────────────────────────────── -->
            <div class="flex items-center gap-3">
                <a href="/dashboard" class="flex items-center gap-3">
                    <div class="flex items-center justify-center w-9 h-9 bg-brand-600 rounded-xl">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083
                                     12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952
                                     11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4
                                     6v-7.5l4-2.222"/>
                        </svg>
                    </div>
                    <span class="text-lg font-bold text-gray-900 tracking-tight">EduFlow CRM</span>
                </a>
            </div>

            <!-- ── Nav links (role-gated) ─────────────────────────────────── -->
            <nav class="hidden md:flex items-center gap-1">

                <a href="/dashboard"
                   th:class="${activePage == 'dashboard'}
                       ? 'px-3 py-2 rounded-lg text-sm font-medium text-brand-700 bg-brand-50'
                       : 'px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition'">
                    Dashboard
                </a>

                <a sec:authorize="hasAnyRole('COUNSELOR','TENANT_ADMIN','SUPER_ADMIN')"
                   href="/students"
                   th:class="${activePage == 'students'}
                       ? 'px-3 py-2 rounded-lg text-sm font-medium text-brand-700 bg-brand-50'
                       : 'px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition'">
                    Students
                </a>

                <a sec:authorize="hasAnyRole('DOC_OFFICER','TENANT_ADMIN','SUPER_ADMIN')"
                   href="/documents"
                   th:class="${activePage == 'documents'}
                       ? 'px-3 py-2 rounded-lg text-sm font-medium text-brand-700 bg-brand-50'
                       : 'px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition'">
                    Documents
                </a>

                <a sec:authorize="hasAnyRole('COUNSELOR','TENANT_ADMIN','SUPER_ADMIN')"
                   href="/applications"
                   th:class="${activePage == 'applications'}
                       ? 'px-3 py-2 rounded-lg text-sm font-medium text-brand-700 bg-brand-50'
                       : 'px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition'">
                    Applications
                </a>

                <a sec:authorize="hasAnyRole('VISA_OFFICER','TENANT_ADMIN','SUPER_ADMIN')"
                   href="/visa"
                   th:class="${activePage == 'visa'}
                       ? 'px-3 py-2 rounded-lg text-sm font-medium text-brand-700 bg-brand-50'
                       : 'px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition'">
                    Visa
                </a>

            </nav>

            <!-- ── User menu ──────────────────────────────────────────────── -->
            <div class="flex items-center gap-3">
                <div class="hidden sm:flex flex-col items-end">
                    <span class="text-sm font-medium text-gray-800" th:text="${fullName}">User Name</span>
                    <span class="text-xs text-gray-500" th:text="${email}">user@example.com</span>
                </div>

                <!-- Avatar initial -->
                <div class="w-9 h-9 rounded-full bg-brand-600 flex items-center justify-center
                            text-white font-semibold text-sm"
                     th:text="${fullName != null and !#strings.isEmpty(fullName)
                         ? #strings.substring(fullName, 0, 1).toUpperCase() : 'U'}">U</div>

                <!-- Sign out -->
                <form th:action="@{/logout}" method="post" class="inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit"
                            class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium
                                   text-gray-600 hover:bg-gray-100 rounded-lg transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3
                                     0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Sign out
                    </button>
                </form>
            </div>

        </div>
    </div>
</header>

</body>
</html>
