<!DOCTYPE html>
<!--
    Verify-form fragment.
    Rendered standalone and injected into #verifyModal via HTMX GET.
    After submission the server swaps #dossierContent and sends
    HX-Trigger: closeVerifyModal so eduflow.js can close the dialog.
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="verifyForm">
    <div class="modal">
        <div class="modal__header">
            <div class="modal__title" id="verifyModalTitle">Verify document</div>
            <button class="btn btn--ghost btn--sm" type="button"
                    data-modal-close aria-label="Close verify dialog">
                <i data-lucide="x" aria-hidden="true"></i>
            </button>
        </div>
        <form id="verifyForm" method="post" novalidate
              th:hx-post="@{/documents/{id}/verify(id=${document.id})}"
              hx-target="#dossierContent"
              hx-swap="outerHTML">
            <th:block th:replace="~{fragments/components :: csrfInput}"></th:block>
            <div class="modal__body stack">
                <p class="is-flush text-muted">
                    <span class="text-strong"
                          th:text="${document.documentTypeLabel}">Document</span>
                    — uploaded <span th:text="${document.originalFilename}">file</span>
                </p>
                <div class="field">
                    <label class="field__label" for="verifyDecision">Decision</label>
                    <select class="select" id="verifyDecision" name="decision" required
                            data-verify-decision>
                        <option value="APPROVE">Approve</option>
                        <option value="REQUEST_REVISION">Request revision</option>
                        <option value="REJECT">Reject</option>
                    </select>
                </div>
                <div class="field">
                    <label class="field__label" for="verifyRemarks">
                        Remarks
                        <span id="remarksRequiredHint" class="field__optional">(optional for Approve)</span>
                    </label>
                    <textarea class="textarea" id="verifyRemarks" name="remarks" maxlength="500"
                              data-verify-remarks></textarea>
                </div>
            </div>
            <div class="modal__footer">
                <button class="btn btn--ghost" type="button" data-modal-close>Cancel</button>
                <button class="btn btn--primary" type="submit">
                    <i data-lucide="shield-check" aria-hidden="true"></i><span>Submit decision</span>
                </button>
            </div>
        </form>
    </div>
</th:block>
</body>
</html>
