<!DOCTYPE html>
<!--
    My Tasks — open work items owned by the current user or their roles.
    Active nav: 'tasks'
-->
<html th:replace="~{fragments/layout :: layout('My Tasks', 'Workflow tasks', 'tasks', ~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">

    <div class="stack">

        <th:block th:replace="~{fragments/components :: toastMarkers(${successMessage}, ${errorMessage})}"></th:block>

        <div class="page-head">
            <div>
                <h1 class="page-head__title">My Tasks</h1>
                <p class="page-head__sub">Open work generated by your students' workflows.</p>
            </div>
        </div>

        <div th:if="${tasks.isEmpty()}" class="empty card">
            <i data-lucide="check-square" class="icon-muted-lg"></i>
            <p class="empty__title">No open tasks</p>
            <p>You're all caught up.</p>
        </div>

        <div class="card" th:unless="${tasks.isEmpty()}">
            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Task</th>
                            <th>Student</th>
                            <th>Role</th>
                            <th>Due</th>
                            <th>Status</th>
                            <th class="cell-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="task : ${tasks}">
                            <td>
                                <span class="table__name" th:text="${task.title}">Task</span>
                                <div class="table__sub" th:if="${task.description}" th:text="${task.description}">desc</div>
                            </td>
                            <td>
                                <a class="table__sub" th:href="@{/students/{id}(id=${task.studentId})}"
                                   th:text="${task.studentName}">Student</a>
                            </td>
                            <td><span class="table__sub" th:text="${task.assignedRole != null ? task.assignedRole : '—'}">—</span></td>
                            <td>
                                <span class="table__sub"
                                      th:text="${task.dueAt != null ? #strings.substring(task.dueAt.toString(),0,10) : '—'}">—</span>
                                <span th:if="${task.overdue}" class="stamp stamp--rejected" style="margin-left:.4rem;">Overdue</span>
                            </td>
                            <td>
                                <span class="stamp"
                                      th:classappend="${task.status.name() == 'IN_PROGRESS'} ? 'stamp--pending' : 'stamp--empty'"
                                      th:text="${task.status}">PENDING</span>
                            </td>
                            <td>
                                <div class="table__actions">
                                    <form th:if="${task.status.name() == 'PENDING'}"
                                          th:action="@{/tasks/{id}/start(id=${task.id})}" method="post">
                                        <th:block th:replace="~{fragments/components :: csrfInput}"></th:block>
                                        <button class="icon-btn" type="submit" title="Start" aria-label="Start">
                                            <i data-lucide="play"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/tasks/{id}/complete(id=${task.id})}" method="post">
                                        <th:block th:replace="~{fragments/components :: csrfInput}"></th:block>
                                        <button class="icon-btn" type="submit" title="Complete" aria-label="Complete">
                                            <i data-lucide="check"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
