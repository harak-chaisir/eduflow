<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set your password · EduFlow</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" th:href="@{/css/eduflow.css}">
</head>
<body class="auth">

    <div class="auth__card">

        <div class="auth__brand">
            <span class="auth__mark"><i data-lucide="graduation-cap"></i></span>
            <div>
                <div class="auth__title">EduFlow CRM</div>
                <div class="auth__sub">Activate your workspace account</div>
            </div>
        </div>

        <!-- Invalid / expired link -->
        <div th:if="${invalid}">
            <h2 style="font-family: var(--font-display); font-size:1.1rem; margin-bottom: var(--space-4);">
                Link is invalid or expired
            </h2>
            <div class="flash flash--error" style="margin-bottom: var(--space-4);">
                <i data-lucide="alert-circle"></i>
                <span>This set-password link is no longer valid. Please ask your administrator to re-send the invite.</span>
            </div>
            <a class="btn btn--ghost" th:href="@{/login}" style="width:100%;">
                <i data-lucide="arrow-left"></i><span>Back to sign in</span>
            </a>
        </div>

        <!-- Set-password form -->
        <div th:unless="${invalid}">
            <h2 style="font-family: var(--font-display); font-size:1.1rem; margin-bottom: var(--space-2);">
                Set your password
            </h2>
            <p class="auth__sub" style="margin-bottom: var(--space-5);">
                for <strong th:text="${email}">you@consultancy.com</strong>
            </p>

            <div th:if="${errorMessage}" class="flash flash--error" style="margin-bottom: var(--space-4);">
                <i data-lucide="alert-circle"></i>
                <span th:text="${errorMessage}">Error.</span>
            </div>

            <form th:action="@{/set-password}" method="post" novalidate>
                <input type="hidden" name="token" th:value="${token}" />

                <div class="field">
                    <label class="field__label" for="password">New password</label>
                    <input class="input" type="password" id="password" name="password"
                           autocomplete="new-password" required minlength="8"
                           placeholder="At least 8 characters" />
                </div>

                <div class="field">
                    <label class="field__label" for="confirmPassword">Confirm password</label>
                    <input class="input" type="password" id="confirmPassword" name="confirmPassword"
                           autocomplete="new-password" required minlength="8"
                           placeholder="Re-enter your password" />
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <button class="btn btn--primary" type="submit" style="width:100%; margin-top: var(--space-2);">
                    <i data-lucide="check"></i><span>Set password &amp; activate</span>
                </button>
            </form>
        </div>
    </div>

    <script th:src="@{/js/lucide.js}"></script>
    <script>
        if (window.lucide) { lucide.createIcons(); }
    </script>
</body>
</html>
