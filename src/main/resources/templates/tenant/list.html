<!DOCTYPE html>
<!--
    Super-admin tenant list. Plugs into the shared sidebar shell.
    Active nav: 'tenants'
-->
<html th:replace="~{fragments/layout :: layout('Tenants', 'All workspaces', 'tenants', ~{::content})}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="content">

    <div class="stack">

        <th:block th:replace="~{fragments/components :: toastMarkers(${successMessage}, ${errorMessage})}"></th:block>

        <div class="page-head">
            <div><h1 class="page-head__title">Tenants</h1></div>
            <div class="page-head__actions">
                <a class="btn btn--primary" href="/tenants/new">
                    <i data-lucide="plus"></i><span>New tenant</span>
                </a>
            </div>
        </div>

        <!-- Filter bar -->
        <div class="card">
            <div class="card__body">
                <!--
                    Valid GET form (no-JS fallback). With JS, HTMX intercepts each input and
                    fires a debounced GET to /tenants/search, swapping only #tenant-results.
                -->
                <form method="get" th:action="@{/tenants}" class="toolbar"
                      hx-get="/tenants/search"
                      hx-trigger="input changed delay:350ms from:[name='q'],
                                  change from:[name='status'],
                                  change from:[name='plan'],
                                  submit"
                      hx-target="#tenant-results"
                      hx-push-url="/tenants">
                    <div class="toolbar__search">
                        <i data-lucide="search"></i>
                        <input class="input" type="text" name="q" th:value="${searchQ}"
                               placeholder="Search by name or slug…" />
                    </div>
                    <div class="field toolbar__field--sm">
                        <select class="select" name="status">
                            <option value="">All statuses</option>
                            <option th:each="s : ${statuses}" th:value="${s.name()}"
                                    th:text="${s}" th:selected="${s == searchStatus}"></option>
                        </select>
                    </div>
                    <div class="field toolbar__field--sm">
                        <select class="select" name="plan">
                            <option value="">All plans</option>
                            <option th:each="p : ${plans}" th:value="${p.name()}"
                                    th:text="${p.label()}" th:selected="${p == searchPlan}"></option>
                        </select>
                    </div>
                    <button class="btn btn--primary" type="submit">
                        <i data-lucide="search"></i><span>Search</span>
                    </button>
                    <a class="btn btn--ghost" href="/tenants">Reset</a>
                </form>
            </div>
        </div>

        <!-- ── Results — this div is the HTMX swap target ─────────────────── -->
        <div id="tenant-results" th:fragment="tenantResults">

        <p class="page-head__sub">
            <span th:text="${tenantsPage.totalElements}">0</span> tenant(s) found
        </p>

        <div th:if="${tenantsPage.totalElements == 0}" class="empty card">
            <i data-lucide="building-2" class="icon-muted-lg"></i>
            <p class="empty__title">No tenants found</p>
            <p>Get started by <a href="/tenants/new">provisioning your first tenant</a>.</p>
        </div>

        <div class="card" th:unless="${tenantsPage.totalElements == 0}">
            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Tenant</th>
                            <th>Plan</th>
                            <th>Status</th>
                            <th>Primary contact</th>
                            <th class="cell-right">Created</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${tenantsPage.content}">
                            <td>
                                <div class="table__primary">
                                    <th:block th:replace="~{fragments/components :: avatar(${t.name}, 'avatar--sm')}"></th:block>
                                    <div>
                                        <a class="table__name" th:href="@{/tenants/{id}(id=${t.id})}"
                                           th:text="${t.name}">Tenant</a>
                                        <div class="table__sub is-mono" th:text="${t.slug}">slug</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="tag" th:text="${t.plan.label()}">Plan</span></td>
                            <td>
                                <th:block th:replace="~{fragments/components :: statusStamp(${t.status}, ${t.status})}"></th:block>
                            </td>
                            <td>
                                <div class="table__sub" th:text="${t.primaryContactName != null ? t.primaryContactName : '—'}">—</div>
                                <div class="table__sub" th:text="${t.primaryContactEmail}">email</div>
                            </td>
                            <td class="cell-right">
                                <span class="table__sub"
                                      th:text="${t.createdAt != null ? #temporals.format(t.createdAt,'yyyy-MM-dd') : '—'}">—</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        </div><!-- /#tenant-results -->
    </div>
</th:block>
</body>
</html>
