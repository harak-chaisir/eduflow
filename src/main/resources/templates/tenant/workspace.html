<!DOCTYPE html>
<!--
    Tenant-admin: edit own workspace profile and settings. Active nav: 'workspace'
-->
<html th:replace="~{fragments/layout :: layout('Workspace settings', 'Your consultancy', 'workspace', ~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">

    <div class="stack">
        <div class="page-head">
            <div>
                <h1 class="page-head__title" th:text="${tenant.name}">Workspace</h1>
                <p class="page-head__sub">Plan: <span th:text="${tenant.plan.label()}">Plan</span></p>
            </div>
        </div>

        <div class="detail-grid">
            <!-- Profile -->
            <div class="card" id="profileCard" th:fragment="profileCard">
                <div class="card__header"><h3 class="card__title">Profile</h3></div>
                <div class="card__body">
                    <span th:if="${profileMessage}" data-toast data-toast-type="success"
                          th:data-toast-message="${profileMessage}"></span>
                    <span th:if="${profileError}" data-toast data-toast-type="error"
                          th:data-toast-message="${profileError}"></span>
                    <form method="post" th:action="@{/workspace/profile}" class="stack"
                          hx-post="/workspace/profile" hx-target="#profileCard" hx-swap="outerHTML">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="field">
                            <label class="field__label" for="name">Display name</label>
                            <input class="input" id="name" type="text" name="name" th:value="${tenant.name}" />
                        </div>
                        <div class="field">
                            <label class="field__label" for="pcName">Primary contact name</label>
                            <input class="input" id="pcName" type="text" name="primaryContactName" th:value="${tenant.primaryContactName}" />
                        </div>
                        <div class="field">
                            <label class="field__label" for="pcEmail">Primary contact email</label>
                            <input class="input" id="pcEmail" type="email" name="primaryContactEmail" th:value="${tenant.primaryContactEmail}" />
                        </div>
                        <div class="field">
                            <label class="field__label" for="pcPhone">Primary contact phone</label>
                            <input class="input" id="pcPhone" type="text" name="primaryContactPhone" th:value="${tenant.primaryContactPhone}" />
                        </div>
                        <div class="field">
                            <label class="field__label" for="locale">Locale</label>
                            <input class="input" id="locale" type="text" name="locale" th:value="${tenant.locale}" />
                        </div>
                        <div class="field">
                            <label class="field__label" for="timezone">Timezone</label>
                            <input class="input" id="timezone" type="text" name="timezone" th:value="${tenant.timezone}" />
                        </div>
                        <button class="btn btn--primary" type="submit">
                            <i data-lucide="save"></i><span>Save profile</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Settings -->
            <div class="card" id="settingsCard" th:fragment="settingsCard">
                <div class="card__header"><h3 class="card__title">Settings</h3></div>
                <div class="card__body">
                    <span th:if="${settingsMessage}" data-toast data-toast-type="success"
                          th:data-toast-message="${settingsMessage}"></span>
                    <span th:if="${settingsError}" data-toast data-toast-type="error"
                          th:data-toast-message="${settingsError}"></span>
                    <form method="post" th:action="@{/workspace/settings}" class="stack"
                          enctype="multipart/form-data"
                          hx-post="/workspace/settings" hx-target="#settingsCard" hx-swap="outerHTML"
                          hx-encoding="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <!-- Brand colour: native colour picker synced with an editable hex field -->
                        <div class="field" data-color-field>
                            <label class="field__label" for="brandColor">Brand colour</label>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <input type="color" data-color-picker aria-label="Pick brand colour"
                                       th:value="${settings.brandColor != null ? settings.brandColor : '#0f766e'}"
                                       style="width:44px; height:40px; padding:2px; cursor:pointer;
                                              border:1px solid var(--line); border-radius:var(--radius-md);
                                              background:var(--surface);" />
                                <input class="input" id="brandColor" type="text" name="brandColor"
                                       data-color-hex th:value="${settings.brandColor}"
                                       placeholder="#0f766e" pattern="#?[0-9a-fA-F]{6}"
                                       style="flex:1;" />
                            </div>
                        </div>

                        <!-- Logo: current preview + replace upload -->
                        <div class="field">
                            <label class="field__label" for="logoFile">Logo</label>
                            <div th:if="${settings.logoReference}" style="margin-bottom:10px;">
                                <img th:src="@{/workspace/logo(v=${settings.updatedAt})}" alt="Current logo"
                                     style="max-height:56px; max-width:180px; padding:4px;
                                            border:1px solid var(--line); border-radius:var(--radius-md);
                                            background:var(--surface);" />
                            </div>
                            <input class="input" id="logoFile" type="file" name="logoFile" accept="image/*"
                                   data-file-input />
                            <p class="form-section__hint" style="margin-top:6px;">
                                PNG, JPG or SVG. Uploading replaces the current logo.
                            </p>
                        </div>

                        <!-- Notification channel: dropdown defaulting to the saved value -->
                        <div class="field">
                            <label class="field__label" for="notificationChannels">Notification channel</label>
                            <select class="select" id="notificationChannels" name="notificationChannels">
                                <option th:each="ch : ${channels}" th:value="${ch.name()}"
                                        th:text="${ch.label()}"
                                        th:selected="${ch.name() == selectedChannel}"></option>
                            </select>
                        </div>

                        <button class="btn btn--primary" type="submit">
                            <i data-lucide="save"></i><span>Save settings</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
