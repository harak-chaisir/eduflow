<!DOCTYPE html>
<!--
    Edit a single workflow stage (PRD §7, §10, §11, §12).
    Active nav: 'workflows'
-->
<html th:replace="~{fragments/layout :: layout('Edit stage', ${workflow.name}, 'workflows', ~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">

    <div class="stack stack--narrow">

        <th:block th:replace="~{fragments/components :: backLink('/workflows/' + ${workflow.id}, 'Back to builder')}"></th:block>
        <th:block th:replace="~{fragments/components :: toastMarkers(${successMessage}, ${errorMessage})}"></th:block>

        <div class="card">
            <div class="card__header"><h3 class="card__title">Edit stage</h3></div>
            <div class="card__body">
                <form th:action="@{/workflows/{id}/stages/{sid}/edit(id=${workflow.id},sid=${stageId})}"
                      method="post" th:object="${stageForm}" class="form-grid">
                    <th:block th:replace="~{fragments/components :: csrfInput}"></th:block>

                    <div class="field">
                        <label class="label" for="name">Name</label>
                        <input class="input" type="text" id="name" th:field="*{name}" required />
                        <p class="field__error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</p>
                    </div>
                    <div class="field">
                        <label class="label" for="code">Code</label>
                        <input class="input" type="text" id="code" th:field="*{code}" required />
                    </div>
                    <div class="field toolbar__field--sm">
                        <label class="label" for="displayOrder">Order</label>
                        <input class="input" type="number" id="displayOrder" th:field="*{displayOrder}" />
                    </div>
                    <div class="field toolbar__field--sm">
                        <label class="label" for="stageType">Type</label>
                        <select class="select" id="stageType" th:field="*{stageType}">
                            <option th:each="t : ${stageTypes}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>
                    <div class="field toolbar__field--sm">
                        <label class="label" for="slaDays">SLA days</label>
                        <input class="input" type="number" min="1" id="slaDays" th:field="*{slaDays}" />
                    </div>
                    <div class="field toolbar__field--sm">
                        <label class="label" for="ownerRole">Owner role</label>
                        <select class="select" id="ownerRole" th:field="*{ownerRole}">
                            <option value="">— none —</option>
                            <option th:each="r : ${assignableRoles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>
                    <div class="field toolbar__field--sm">
                        <label class="label" for="color">Color</label>
                        <input class="input" type="text" id="color" th:field="*{color}" placeholder="#2563eb" />
                    </div>
                    <div class="field field--full">
                        <label class="label checkbox">
                            <input type="checkbox" th:field="*{active}" />
                            <span>Active</span>
                        </label>
                    </div>
                    <div class="field field--full">
                        <label class="label" for="description">Description</label>
                        <textarea class="input" id="description" rows="2" th:field="*{description}"></textarea>
                    </div>
                    <div class="field field--full">
                        <label class="label" for="requiredDocuments">Required documents</label>
                        <select class="select" id="requiredDocuments" th:field="*{requiredDocuments}" multiple size="5">
                            <option th:each="d : ${documentTypes}" th:value="${d}" th:text="${d.label()}"></option>
                        </select>
                    </div>

                    <div class="form-actions field--full">
                        <a class="btn btn--ghost" th:href="@{/workflows/{id}(id=${workflow.id})}">Cancel</a>
                        <button class="btn btn--primary" type="submit"><i data-lucide="save"></i><span>Save stage</span></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
