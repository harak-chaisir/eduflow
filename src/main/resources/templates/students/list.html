<!DOCTYPE html>
<!--
    Student list page.
    Plugs into the shared sidebar shell via fragments/layout.
    Active nav: 'students'
-->
<html th:replace="~{fragments/layout :: layout('Students', 'All students', 'students', ~{::content})}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="content">

    <div class="stack"
         th:with="stampClass=${ {'LEAD':'stamp--empty','QUALIFIED':'stamp--pending','ACTIVE':'stamp--approved','ENROLLED':'stamp--needs_revision','INACTIVE':'stamp--rejected'} }">

        <!-- ── Flash messages ─────────────────────────────────────────────── -->
        <div th:if="${successMessage}" class="flash flash--success">
            <i data-lucide="check-circle-2"></i>
            <span th:text="${successMessage}">Saved.</span>
        </div>
        <div th:if="${errorMessage}" class="flash flash--error">
            <i data-lucide="alert-circle"></i>
            <span th:text="${errorMessage}">Error.</span>
        </div>

        <!-- ── Page header ─────────────────────────────────────────────────── -->
        <div class="page-head">
            <div>
                <h1 class="page-head__title">Students</h1>
            </div>
            <div class="page-head__actions">
                <a sec:authorize="hasAnyRole('COUNSELOR','TENANT_ADMIN','SUPER_ADMIN')"
                   class="btn btn--primary" href="/students/new">
                    <i data-lucide="plus"></i>
                    <span>Register student</span>
                </a>
            </div>
        </div>

        <!-- ── Search / filter bar ─────────────────────────────────────────── -->
        <div class="card">
            <div class="card__body">
                <!--
                    The form itself is still a valid GET form (no-JS fallback).
                    When JS is available HTMX intercepts each input and fires a
                    debounced GET to /students/search, swapping only #student-results.
                -->
                <form id="studentSearchForm"
                      method="get" th:action="@{/students}"
                      class="toolbar"
                      hx-get="/students/search"
                      hx-trigger="input changed delay:350ms from:#searchName,
                                  input changed delay:350ms from:#searchEmail,
                                  change from:#searchStatus,
                                  submit"
                      hx-target="#student-results"
                      hx-push-url="/students">
                    <div class="toolbar__search">
                        <i data-lucide="search"></i>
                        <input class="input" type="text" id="searchName" name="name"
                               th:value="${searchName}"
                               placeholder="Search by name…" />
                    </div>
                    <div class="field" style="flex: 1 1 220px;">
                        <input class="input" type="text" id="searchEmail" name="email"
                               th:value="${searchEmail}"
                               placeholder="Search by email…" />
                    </div>
                    <div class="field" style="min-width: 170px;">
                        <select class="select" id="searchStatus" name="status">
                            <option value="">All statuses</option>
                            <option th:each="s : ${statuses}" th:value="${s.name()}"
                                    th:text="${s}" th:selected="${s == searchStatus}"></option>
                        </select>
                    </div>
                    <button class="btn btn--primary" type="submit">
                        <i data-lucide="search"></i><span>Search</span>
                    </button>
                    <a class="btn btn--ghost" href="/students">Reset</a>
                </form>
            </div>
        </div>

        <!-- ── Results — this div is the HTMX swap target ─────────────────── -->
        <div id="student-results" th:fragment="studentResults"
             th:with="stampClass=${ {'LEAD':'stamp--empty','QUALIFIED':'stamp--pending','ACTIVE':'stamp--approved','ENROLLED':'stamp--needs_revision','INACTIVE':'stamp--rejected'} }">

            <p class="page-head__sub" style="margin-bottom: var(--space-3);">
                <span th:text="${studentsPage.totalElements}">0</span> student(s) found
            </p>

            <!-- Empty state -->
            <div th:if="${studentsPage.totalElements == 0}" class="empty card">
                <i data-lucide="users-round" style="width:40px;height:40px;opacity:.4;"></i>
                <p class="empty__title">No students found</p>
                <p th:if="${searchName != null or searchEmail != null or searchStatus != null}">
                    Try adjusting your filters or
                    <a href="/students">clear the search</a>.
                </p>
                <p th:unless="${searchName != null or searchEmail != null or searchStatus != null}"
                   sec:authorize="hasAnyRole('COUNSELOR','TENANT_ADMIN','SUPER_ADMIN')">
                    Get started by <a href="/students/new">registering your first student</a>.
                </p>
            </div>

            <!-- Table -->
            <div class="card" th:unless="${studentsPage.totalElements == 0}">
                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Counselor</th>
                                <th style="text-align:right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="student : ${studentsPage.content}">
                                <td>
                                    <div class="table__primary">
                                        <span class="avatar avatar--sm"
                                              th:text="${#strings.substring(student.firstName, 0, 1).toUpperCase()}">A</span>
                                        <div>
                                            <a class="table__name" th:href="@{/students/{id}(id=${student.id})}"
                                               th:text="${student.fullName}">Student Name</a>
                                            <div class="table__sub" th:text="${student.email}">email</div>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="is-mono" style="font-size:.85rem;"
                                          th:text="${student.phone != null ? student.phone : '—'}">—</span>
                                </td>
                                <td>
                                    <span class="stamp"
                                          th:classappend="${stampClass.get(student.status.name())}"
                                          th:text="${student.status}">LEAD</span>
                                </td>
                                <td>
                                    <span class="table__sub"
                                          th:text="${student.assignedCounselorName != null ? student.assignedCounselorName : '—'}">—</span>
                                </td>
                                <td>
                                    <div class="table__actions">
                                        <a class="icon-btn" th:href="@{/students/{id}(id=${student.id})}"
                                           title="View" aria-label="View">
                                            <i data-lucide="eye"></i>
                                        </a>
                                        <a sec:authorize="hasAnyRole('COUNSELOR','TENANT_ADMIN','SUPER_ADMIN')"
                                           class="icon-btn" th:href="@{/students/{id}/edit(id=${student.id})}"
                                           title="Edit" aria-label="Edit">
                                            <i data-lucide="pencil"></i>
                                        </a>
                                        <form sec:authorize="hasAnyRole('TENANT_ADMIN','SUPER_ADMIN')"
                                              th:action="@{/students/{id}/delete(id=${student.id})}"
                                              method="post"
                                              th:if="${student.status.name() != 'INACTIVE'}"
                                              hx-post th:hx-post="@{/students/{id}/delete(id=${student.id})}"
                                              hx-confirm="Deactivate this student?"
                                              hx-target="#student-results"
                                              hx-push-url="false">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <button class="icon-btn icon-btn--danger" type="submit"
                                                    title="Deactivate" aria-label="Deactivate">
                                                <i data-lucide="user-x"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- ── Pagination ──────────────────────────────────────────── -->
                <div class="pagination">
                    <p class="pagination__info">
                        Showing
                        <strong th:text="${studentsPage.number * studentsPage.size + 1}">1</strong>–<strong
                            th:text="${studentsPage.number * studentsPage.size + studentsPage.numberOfElements}">20</strong>
                        of <strong th:text="${studentsPage.totalElements}">0</strong> students
                    </p>

                    <div class="pagination__pages">
                        <a th:if="${studentsPage.hasPrevious()}" class="page-btn"
                           th:href="@{/students(page=${studentsPage.number - 1}, size=${currentSize}, name=${searchName}, email=${searchEmail}, status=${searchStatus})}"
                           th:hx-get="@{/students/search(page=${studentsPage.number - 1}, size=${currentSize}, name=${searchName}, email=${searchEmail}, status=${searchStatus})}"
                           hx-target="#student-results" hx-push-url="true">
                            <i data-lucide="chevron-left" class="icon-sm"></i>
                        </a>
                        <span th:unless="${studentsPage.hasPrevious()}" class="page-btn is-disabled">
                            <i data-lucide="chevron-left" class="icon-sm"></i>
                        </span>

                        <th:block th:with="
                                startPage=${T(java.lang.Math).max(0, studentsPage.number - 2)},
                                endPage=${T(java.lang.Math).min(studentsPage.totalPages - 1, studentsPage.number + 2)}">
                            <th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
                                <a th:if="${i != studentsPage.number}" class="page-btn"
                                   th:href="@{/students(page=${i}, size=${currentSize}, name=${searchName}, email=${searchEmail}, status=${searchStatus})}"
                                   th:hx-get="@{/students/search(page=${i}, size=${currentSize}, name=${searchName}, email=${searchEmail}, status=${searchStatus})}"
                                   hx-target="#student-results" hx-push-url="true"
                                   th:text="${i + 1}">1</a>
                                <span th:if="${i == studentsPage.number}" class="page-btn is-active"
                                      th:text="${i + 1}">1</span>
                            </th:block>
                        </th:block>

                        <a th:if="${studentsPage.hasNext()}" class="page-btn"
                           th:href="@{/students(page=${studentsPage.number + 1}, size=${currentSize}, name=${searchName}, email=${searchEmail}, status=${searchStatus})}"
                           th:hx-get="@{/students/search(page=${studentsPage.number + 1}, size=${currentSize}, name=${searchName}, email=${searchEmail}, status=${searchStatus})}"
                           hx-target="#student-results" hx-push-url="true">
                            <i data-lucide="chevron-right" class="icon-sm"></i>
                        </a>
                        <span th:unless="${studentsPage.hasNext()}" class="page-btn is-disabled">
                            <i data-lucide="chevron-right" class="icon-sm"></i>
                        </span>
                    </div>
                </div>
            </div>

        </div><!-- /#student-results -->
    </div>

</th:block>
</body>
</html>
