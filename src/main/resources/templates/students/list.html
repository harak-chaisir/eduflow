<!DOCTYPE html>
<!--
    Student list page.
    Plugs into the shared sidebar shell via fragments/layout.
    Active nav: 'students'
-->
<html th:replace="~{fragments/layout :: layout('Students', 'All students', 'students', ~{::content})}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="content">

    <div class="stack">

        <div class="page-head">
            <div>
                <h1 class="page-head__title">Students</h1>
            </div>
            <div class="page-head__actions">
                <a sec:authorize="hasAnyRole('COUNSELOR','TENANT_ADMIN','SUPER_ADMIN')"
                   class="btn btn--primary" href="/students/new">
                    <i data-lucide="plus"></i>
                    <span>Register student</span>
                </a>
            </div>
        </div>

        <!-- ── Search / filter bar ─────────────────────────────────────────── -->
        <div class="card">
            <div class="card__body">
                <!--
                    The form itself is still a valid GET form (no-JS fallback).
                    When JS is available HTMX intercepts each input and fires a
                    debounced GET to /students/search, swapping only #student-results.
                -->
                <form id="studentSearchForm"
                      method="get" th:action="@{/students}"
                      class="toolbar"
                      hx-get="/students/search"
                      hx-trigger="input changed delay:350ms from:#searchName,
                                  input changed delay:350ms from:#searchEmail,
                                  change from:#searchStatus,
                                  submit"
                      hx-target="#student-results"
                      hx-push-url="/students">
                    <div class="toolbar__search">
                        <i data-lucide="search"></i>
                        <input class="input" type="text" id="searchName" name="name"
                               th:value="${searchName}"
                               placeholder="Search by name…" />
                    </div>
                    <div class="field toolbar__field">
                        <input class="input" type="text" id="searchEmail" name="email"
                               th:value="${searchEmail}"
                               placeholder="Search by email…" />
                    </div>
                    <div class="field toolbar__field--sm">
                        <select class="select" id="searchStatus" name="status">
                            <option value="">All statuses</option>
                            <option th:each="s : ${statuses}" th:value="${s.name()}"
                                    th:text="${s}" th:selected="${s == searchStatus}"></option>
                        </select>
                    </div>
                    <button class="btn btn--primary" type="submit">
                        <i data-lucide="search"></i><span>Search</span>
                    </button>
                    <a class="btn btn--ghost" href="/students">Reset</a>
                </form>
            </div>
        </div>

        <!-- ── Results — this div is the HTMX swap target ─────────────────── -->
        <div id="student-results" th:fragment="studentResults"
             th:with="filterQuery=${(searchName != null and !#strings.isEmpty(searchName) ? '&name=' + #uris.escapeQueryParam(searchName) : '')
                                  + (searchEmail != null and !#strings.isEmpty(searchEmail) ? '&email=' + #uris.escapeQueryParam(searchEmail) : '')
                                  + (searchStatus != null ? '&status=' + searchStatus : '')}">

            <!-- Toast markers carried inside the swapped fragment (e.g. after a delete) -->
            <th:block th:replace="~{fragments/components :: toastMarkers(${successMessage}, ${errorMessage})}"></th:block>

            <p class="page-head__sub result-count">
                <span th:text="${studentsPage.totalElements}">0</span> student(s) found
            </p>

            <!-- Empty state -->
            <div th:if="${studentsPage.totalElements == 0}" class="empty card">
                <i data-lucide="users-round" class="icon-muted-lg"></i>
                <p class="empty__title">No students found</p>
                <p th:if="${searchName != null or searchEmail != null or searchStatus != null}">
                    Try adjusting your filters or
                    <a href="/students">clear the search</a>.
                </p>
                <p th:unless="${searchName != null or searchEmail != null or searchStatus != null}"
                   sec:authorize="hasAnyRole('COUNSELOR','TENANT_ADMIN','SUPER_ADMIN')">
                    Get started by <a href="/students/new">registering your first student</a>.
                </p>
            </div>

            <!-- Table -->
            <div class="card" th:unless="${studentsPage.totalElements == 0}">
                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Counselor</th>
                                <th class="cell-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="student : ${studentsPage.content}">
                                <td>
                                    <div class="table__primary">
                                        <th:block th:replace="~{fragments/components :: avatar(${student.firstName}, 'avatar--sm')}"></th:block>
                                        <div>
                                            <a class="table__name" th:href="@{/students/{id}(id=${student.id})}"
                                               th:text="${student.fullName}">Student Name</a>
                                            <div class="table__sub" th:text="${student.email}">email</div>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="is-mono table__mono"
                                          th:text="${student.phone != null ? student.phone : '—'}">—</span>
                                </td>
                                <td>
                                    <th:block th:replace="~{fragments/components :: statusStamp(${student.status}, ${student.status})}"></th:block>
                                </td>
                                <td>
                                    <span class="table__sub"
                                          th:text="${student.assignedCounselorName != null ? student.assignedCounselorName : '—'}">—</span>
                                </td>
                                <td>
                                    <div class="table__actions">
                                        <a class="icon-btn" th:href="@{/students/{id}(id=${student.id})}"
                                           title="View" aria-label="View">
                                            <i data-lucide="eye"></i>
                                        </a>
                                        <a sec:authorize="hasAnyRole('COUNSELOR','TENANT_ADMIN','SUPER_ADMIN')"
                                           class="icon-btn" th:href="@{/students/{id}/edit(id=${student.id})}"
                                           title="Edit" aria-label="Edit">
                                            <i data-lucide="pencil"></i>
                                        </a>
                                        <form sec:authorize="hasAnyRole('TENANT_ADMIN','SUPER_ADMIN')"
                                              th:action="@{/students/{id}/delete(id=${student.id})}"
                                              method="post"
                                              th:if="${student.status.name() != 'INACTIVE'}"
                                              hx-post th:hx-post="@{/students/{id}/delete(id=${student.id})}"
                                              hx-confirm="Deactivate this student?"
                                              hx-target="#student-results"
                                              hx-push-url="false">
                                            <th:block th:replace="~{fragments/components :: csrfInput}"></th:block>
                                            <button class="icon-btn icon-btn--danger" type="submit"
                                                    title="Deactivate" aria-label="Deactivate">
                                                <i data-lucide="user-x"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- ── Pagination ──────────────────────────────────────────── -->
                <th:block th:replace="~{fragments/pagination :: pagination(${studentsPage}, '/students', '/students/search', '#student-results', ${filterQuery})}"></th:block>
            </div>

        </div><!-- /#student-results -->
    </div>

</th:block>
</body>
</html>
