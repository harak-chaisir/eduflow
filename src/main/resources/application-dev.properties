# ============================================================================
# Dev profile — activated automatically by `./mvnw spring-boot:run`
# (see spring-boot-maven-plugin <profiles> in pom.xml). NOT used by the
# packaged jar, so production serving/caching is untouched.
#
# Goal: edit a Thymeleaf template, CSS or JS and see it in the browser without
# rebuilding or restarting. Spring Boot DevTools provides the LiveReload server
# (port 35729); the templates/static are served straight from src/ below.
# ============================================================================

# ── Serve templates & static assets from source (no rebuild needed) ──────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/
spring.web.resources.cache.period=0
# Disable content-hash versioning in dev so a changed file is served immediately
# under its plain URL (e.g. /css/eduflow.css, not /css/eduflow-<hash>.css).
spring.web.resources.chain.strategy.content.enabled=false

# ── DevTools: watch the source tree ──────────────────────────────────────────
# Changes under src/main/resources/static & templates trigger a LiveReload
# browser refresh (excluded from restart); Java changes trigger a fast restart.
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/resources
spring.devtools.restart.exclude=static/**,templates/**,public/**

# Toggles the LiveReload client script include in the layout (dev only).
eduflow.livereload.enabled=true
