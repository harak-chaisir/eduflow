spring.application.name=eduflow

# ── DataSource ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/eduflow
spring.datasource.username=eduflow
spring.datasource.password=eduflow
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Document storage ───────────────────────────────────────────────────────
# Local filesystem is the default backend; switch to Google Drive by setting
# eduflow.google-drive.enabled=true (see docs/INTEGRATION.md).
eduflow.documents.local-root=${EDUFLOW_DOC_ROOT:./var/eduflow-documents}
eduflow.google-drive.enabled=false
# eduflow.google-drive.application-name=EduFlow CRM
# eduflow.google-drive.credentials-location=file:${EDUFLOW_DRIVE_KEY:/etc/eduflow/drive-sa.json}
# eduflow.google-drive.root-folder-id=${EDUFLOW_DRIVE_ROOT:}
# eduflow.google-drive.shared-drive=true

# ── Multipart upload limits ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ── Static resources ─────────────────────────────────────────────────────────
# Content-hash versioning: @{/js/eduflow.js} renders as /js/eduflow-<hash>.js, so a
# changed CSS/JS file always gets a new URL and is never served stale from cache.
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
