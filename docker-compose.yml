services:
  postgres:
    image: postgres:17-alpine
    container_name: eduflow-postgres
    environment:
      POSTGRES_DB: eduflow
      POSTGRES_USER: eduflow
      POSTGRES_PASSWORD: eduflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduflow -d eduflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

